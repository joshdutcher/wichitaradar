{{define "satellite"}} {{template "base" .}} {{end}} {{define "content"}}
<div class="pure-g">
  <div class="pure-u pure-u-1 pure-u-md-1-1 pure-u-lg-1-2">
    <!-- GOES-16 CONUS GeoColor -->
    <a href="https://www.star.nesdis.noaa.gov/GOES/GOES16_CONUS_Band.php?band=GEOCOLOR&length=24">
      <img
        class="pure-img-responsive"
        src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/GIFS/GOES16-CONUS-GEOCOLOR-625x375.gif"
        alt="GOES-16 CONUS GeoColor satellite animation from NOAA"
      />
    </a>
    <!-- GOES-16 UMV GeoColor -->
    <a href="https://www.star.nesdis.noaa.gov/GOES/GOES16_sector_band.php?sector=umv&band=GEOCOLOR&length=24">
      <img
        class="pure-img-responsive"
        src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/GIFS/GOES16-UMV-GEOCOLOR-600x600.gif"
        alt="GOES-16 Upper Mississippi Valley GeoColor satellite animation from NOAA"
      />
    </a>
  </div>

  <div class="pure-u pure-u-1 pure-u-md-1-1 pure-u-lg-1-2">
    <!-- Wunderground Regional Infrared -->
    <a href="https://www.wunderground.com/maps/satellite/regional-infrared/usace">
      <img
        id="wu-radar"
        class="pure-img-responsive"
        src="https://s.w-x.co/staticmaps/wu/wu/satir1200_cur/usace/animate.png"
        alt="Regional infrared satellite animation from Wunderground"
      />
    </a>
    <!-- AccuWeather Satellite -->
    <a href="https://www.accuweather.com/en/us/kansas/satellite">
      <img
        class="pure-img-responsive"
        src="https://sirocco.accuweather.com/sat_mosaic_640x480_public/ei/isaeks_.gif"
        alt="Kansas satellite image from AccuWeather"
      />
    </a>
  </div>
</div>

<script>
  (function () {
    var img = document.getElementById('wu-radar');
    var src = img.src;

    fetch(src)
      .then(function (r) {
        return r.blob();
      })
      .then(function (blob) {
        img.src = URL.createObjectURL(blob);

        setInterval(function () {
          var prev = img.src;
          img.src = URL.createObjectURL(blob);
          URL.revokeObjectURL(prev);
        }, 3500);
      });
  })();
</script>
{{end}}
